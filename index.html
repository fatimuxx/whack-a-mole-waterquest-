<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Whack-A-Mole</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<main class="container">

    <header class="top">
        <!-- FEEDBACK -->
        <aside class="feedback">
            <h3>FEEDBACK</h3>
        </aside>

        <!-- AVATAR -->
        <figure class="avatar">
            <div class="avatar-circle"></div>
            <figcaption>AVATAR</figcaption>
        </figure>

        <!-- SCORE -->
        <section class="score" aria-live="polite">
            <h3>SCORE: <span id="score">0</span></h3> <!-- ✅ FIXED -->
            <div class="score-bar"></div>
        </section>
    </header>

    <!-- GRID -->
    <section class="grid" aria-label="game grid">
        <button class="hole" data-index="0" aria-label="hole 1">
            <img src="charityjug.jpg" alt="charity jug" class="jug">
        </button>
        <button class="hole" data-index="1" aria-label="hole 2">
            <img src="charityjug.jpg" alt="charity jug" class="jug">
        </button>
        <button class="hole" data-index="2" aria-label="hole 3">
            <img src="charityjug.jpg" alt="charity jug" class="jug">
        </button>
        <button class="hole" data-index="3" aria-label="hole 4">
            <img src="charityjug.jpg" alt="charity jug" class="jug">
        </button>
        <button class="hole" data-index="4" aria-label="hole 5">
            <img src="charityjug.jpg" alt="charity jug" class="jug">
        </button>
        <button class="hole" data-index="5" aria-label="hole 6">
            <img src="charityjug.jpg" alt="charity jug" class="jug">
        </button>
    </section>

    <h1 class="title">WHACK - A - MOLE</h1>
    <img src="charitywaterlogo2.png" alt="Charity Water Logo" class="charity-logo charity-logo-centered">

    <!-- BUTTONS -->
    <nav class="buttons" aria-label="game controls">
        <button id="startBtn">START</button>   <!-- ✅ FIXED -->
        <button id="resumeBtn">RESUME</button>
        <button id="resetBtn">RESET</button>
    </nav>

</main>

<!-- JS at bottom (good 👍) -->
<script src="script.js"></script>

</body>
</html>
