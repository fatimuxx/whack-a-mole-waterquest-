<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Whack-A-Mole</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<main class="container">

    <header class="top">
        <!-- AVATAR -->
        <figure class="avatar">
            <label for="avatar-upload" class="avatar-upload-label">
                <img id="avatar-img" src="placeholder-avatar.jpg" alt="user avatar" class="avatar-circle">
                <span class="avatar-hint">Click to upload</span>
            </label>
            <input type="file" id="avatar-upload" accept="image/*" hidden>
            <!-- Avatar Options -->
            <div class="avatar-options">
                <button type="button" class="avatar-option" data-avatar="gumball.png" aria-label="Gumball">
                    <img src="gumball.png" alt="Gumball">
                </button>
                <button type="button" class="avatar-option" data-avatar="hellokittypfp.png" aria-label="Hello Kitty">
                    <img src="hellokittypfp.png" alt="Hello Kitty">
                </button>
                <button type="button" class="avatar-option" data-avatar="minniemouse.png" aria-label="Minnie Mouse">
                    <img src="minniemouse.png" alt="Minnie Mouse">
                </button>
                <button type="button" class="avatar-option" data-avatar="patrickstar.png" aria-label="Patrick Star">
                    <img src="patrickstar.png" alt="Patrick Star">
                </button>
            </div>
        </figure>

        <!-- SCORE -->
        <section class="score" aria-live="polite">
            <h3>SCORE: <span id="score">0</span></h3> <!-- ✅ FIXED -->
            <div class="score-bar"></div>
        </section>
    </header>

    <!-- GRID -->
    <section class="grid" aria-label="game grid">
        <button class="hole" data-index="0" aria-label="hole 1"></button>
        <button class="hole" data-index="1" aria-label="hole 2"></button>
        <button class="hole" data-index="2" aria-label="hole 3"></button>
        <button class="hole" data-index="3" aria-label="hole 4"></button>
        <button class="hole" data-index="4" aria-label="hole 5"></button>
        <button class="hole" data-index="5" aria-label="hole 6"></button>
    </section>

    <h1 class="title">WHACK - A - MOLE</h1>
    <img src="charitywaterlogo2.png" alt="Charity Water Logo" class="charity-logo charity-logo-centered">

    <!-- BUTTONS -->
    <nav class="buttons" aria-label="game controls">
        <button id="startBtn">START</button>   <!-- ✅ FIXED -->
        <button id="resumeBtn">RESUME</button>
        <button id="resetBtn">RESET</button>
    </nav>

</main>

<!-- JS at bottom (good 👍) -->
<script src="script.js"></script>

</body>
</html>
