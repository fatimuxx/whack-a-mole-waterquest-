<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Whack-A-Mole</title>

<!-- LINK TO CSS FILE -->
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="top">
        <!-- FEEDBACK -->
        <div class="feedback">
            <h3>FEEDBACK</h3>
    
        </div>

        <!-- AVATAR -->
        <div class="avatar">
            <div class="avatar-circle"></div>
            <p>AVATAR</p>
        </div>

        <!-- SCORE -->
        <div class="score">
            <h3>SCORE</h3>
            <div class="score-bar"></div>
        </div>
    </div>

    <!-- GRID -->
    <div class="grid">
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
    </div>

    <div class="title">WHACK - A - MOLE</div>

    <!-- BUTTONS -->
    <div class="buttons">
        <button>START</button>
        <button>RESUME</button>
        <button>RESET</button>
    </div>

</div>

</body>
</html>
