<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Whack-A-Mole</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="top">
        <!-- FEEDBACK -->
        <div class="feedback">
            <h3>FEEDBACK</h3>
        </div>

        <!-- AVATAR -->
        <div class="avatar">
            <div class="avatar-circle"></div>
            <p>AVATAR</p>
        </div>

        <!-- SCORE -->
        <div class="score">
            <h3>SCORE: <span id="score">0</span></h3> <!-- ✅ FIXED -->
            <div class="score-bar"></div>
        </div>
    </div>

    <!-- GRID -->
    <div class="grid">
        <div class="hole" data-index="0"></div>
        <div class="hole" data-index="1"></div>
        <div class="hole" data-index="2"></div>
        <div class="hole" data-index="3"></div>
        <div class="hole" data-index="4"></div>
        <div class="hole" data-index="5"></div>
    </div>

    <div class="title">WHACK - A - MOLE</div>

    <!-- BUTTONS -->
    <div class="buttons">
        <button id="startBtn">START</button>   <!-- ✅ FIXED -->
        <button id="resumeBtn">RESUME</button>
        <button id="resetBtn">RESET</button>
    </div>

</div>

<!-- JS at bottom (good 👍) -->
<script src="script.js"></script>

</body>
</html>
